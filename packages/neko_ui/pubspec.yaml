name: neko_ui
description: Reusable UI components for NekoComic
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_staggered_grid_view: ^0.7.0
  shimmer_animation: ^2.1.0
  flex_seed_scheme: ^4.0.1
  dynamic_color: ^1.8.1

  # Utils
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
