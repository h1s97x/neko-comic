name: neko_core
description: Core data models, storage, and network layer for NekoComic
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.9.2
  rhttp: ^0.15.1

  # Database
  sqlite3: ^2.7.4
  sqlite3_flutter_libs: ^0.5.30
  path_provider: any
  path: ^1.9.0

  # Utils
  crypto: ^3.0.6
  pointycastle: ^4.0.0
  uuid: ^4.5.1
  intl: any

  # WebDAV
  webdav_client:
    git:
      url: https://github.com/venera-app/webdav_client
      ref: 2f669c98fb81cff1c64fee93466a1475c77e4273

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
