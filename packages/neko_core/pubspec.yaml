name: neko_core
description: Core data models, storage, and network layer for NekoComic
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: any
  rhttp: any

  # Database
  sqlite3: any
  sqlite3_flutter_libs: any
  path_provider: any
  path: any

  # Utils
  crypto: any
  pointycastle: any
  uuid: any
  intl: any

  # WebDAV
  webdav_client:
    git:
      url: https://github.com/venera-app/webdav_client
      ref: 2f669c98fb81cff1c64fee93466a1475c77e4273

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
