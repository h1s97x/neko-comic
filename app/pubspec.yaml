name: neko_comic_app
description: NekoComic - A modern comic reader
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Packages
  neko_core: { path: ../packages/neko_core }
  neko_source_js: { path: ../packages/neko_source_js }
  neko_image: { path: ../packages/neko_image }
  neko_reader: { path: ../packages/neko_reader }
  neko_ui: { path: ../packages/neko_ui }

  # Platform
  window_manager: ^0.5.1
  app_links: ^7.0.0
  url_launcher: ^6.3.2

  # File
  flutter_file_dialog: ^3.0.3
  file_selector: ^1.1.0
  share_plus: ^12.0.1
  zip_flutter: ^0.0.13

  # Utils
  yaml: ^3.1.3
  intl: any

  # UI
  flex_seed_scheme: ^4.0.1
  dynamic_color: ^1.8.1

  # Navigation
  go_router: ^15.0.0

  # State Management
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: NekoIcons
      fonts:
        - asset: assets/fonts/NekoIcons.ttf
